kind = "web"
previewPath = "/"
title = "Moodify - AI Music Recommendations"
version = "1.0.0"
id = "artifacts/moodify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19629
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/moodify run dev"

[services.env]
PORT = "19629"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/moodify", "run", "build"]
publicDir = "artifacts/moodify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
